<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>XR 高清全屏换脸仪</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/delaunator@5.0.0/delaunator.min.js"></script>
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            margin: 0; 
            background: #000; 
            overflow: hidden;
        }
        
        #container { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            z-index: 1;
        }
        
        video { display: none; }
        
        .fullscreen-canvas { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            object-fit: cover; 
        }
        
        #three_canvas { 
            pointer-events: none;
            z-index: 2;
        }

        .dashboard { 
            position: fixed; 
            bottom: 40px; 
            left: 50%; 
            transform: translateX(-50%);
            width: 90%; 
            max-width: 420px; 
            padding: 24px; 
            background: rgba(10, 20, 10, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 64, 0.2);
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(0, 255, 64, 0.1);
            text-align: center;
            z-index: 10;
        }

        #instruction { font-size: 18px; font-weight: 600; color: #00ff40; margin-bottom: 18px; letter-spacing: 0.5px; text-shadow: 0 0 12px rgba(0,255,64,0.4); }
        .task-grid { display: grid; grid-template-columns: 1fr; margin-bottom: 18px; }
        .task { font-size: 14px; opacity: 0.6; padding: 14px; border: 1px solid rgba(0,255,64,0.1); border-radius: 16px; background: rgba(0,255,64,0.03); color: #88ffaa; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .task.active { opacity: 1; border-color: rgba(0,255,64,0.4); background: rgba(0,255,64,0.1); font-weight: 600; box-shadow: 0 0 20px rgba(0,255,64,0.15); color: #00ff40; }
        .task.done { opacity: 1; background: rgba(0,255,64,0.15); border-color: #00ff40; color: #00ff40; display: none; } 

        button { width: 100%; padding: 16px; font-size: 15px; border-radius: 18px; border: 1px solid rgba(0,255,64,0.4); font-weight: 600; cursor: pointer; margin-top: 12px; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); color: #000; background: linear-gradient(135deg, #00ff40 0%, #00b32d 100%); box-shadow: 0 4px 15px rgba(0, 255, 64, 0.2); letter-spacing: 0.5px; }
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 255, 64, 0.4); border-color: rgba(0,255,64,0.6); }
        button:active { transform: scale(0.97); }
        #start_btn { margin-top:0; }
        #view_btn { display: none; }
        #swap_btn { display: none; }
        #reset_btn { display: none; }
        #flip_btn { }
    </style>
</head>
<body>
    <div id="container">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas" class="fullscreen-canvas"></canvas>
        <canvas id="three_canvas" class="fullscreen-canvas"></canvas>
    </div>

    <div class="dashboard">
        <div id="instruction">神经网络加载中...</div>
        <div class="task-grid">
            <div class="task" id="t_front">请保持正脸平视屏幕，扫描中...</div>
        </div>
        
        <button id="start_btn" disabled>请稍候...</button>
        <button id="upload_btn" style="display: none;">上传图片换脸</button>
        <input type="file" id="upload_input" accept="image/*" multiple style="display: none;">
        <button id="swap_btn">开启实时换脸 (AR)</button>
        <div id="switch_container" style="display: none; justify-content: space-between; gap: 10px; margin-top: 10px;">
            <button id="prev_btn" style="margin-top: 0;">◀ 变脸</button>
            <button id="next_btn" style="margin-top: 0;">变脸 ▶</button>
        </div>
        <button id="view_btn">查看 3D 拓扑模型</button>
        
        <div style="display: flex; gap: 10px;">
            <button id="flip_btn">切换镜头</button>
            <button id="reset_btn">重新扫描</button>
        </div>
    </div>

    <script type="module">
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const threeCanvas = document.getElementById('three_canvas');
        
        const instruction = document.getElementById('instruction');
        const startBtn = document.getElementById('start_btn');
        const uploadBtn = document.getElementById('upload_btn');
        const uploadInput = document.getElementById('upload_input');
        const viewBtn = document.getElementById('view_btn');
        const swapBtn = document.getElementById('swap_btn');
        const resetBtn = document.getElementById('reset_btn');
        const flipBtn = document.getElementById('flip_btn');

        let scanPhase = 'idle', poseStartTime = 0, faceData = null, cameraAspect = 1.0;
        let sourceMirrored = true;
        const LOCK_TIME = 1500; 
        let textures = { front:null };

        let scene3D, camera3D, renderer3D, faceMesh3D;
        let imagesToProcess = [], faceDataArray = [], currentFaceIndex = 0, batchResolve = null;

        function speak(t) {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'zh-CN';
            window.speechSynthesis.speak(m);
        }

        const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

        faceMesh.onResults((res) => {
            let w, h;
            
            // 批量处理多图模式
            if (scanPhase === 'batch_processing') {
                if (res.multiFaceLandmarks && res.multiFaceLandmarks[0]) {
                    const face = res.multiFaceLandmarks[0];
                    const iw = res.image.width, ih = res.image.height;
                    const tex = captureFrameFromImage(res, iw, ih);
                    const fd = face.map(p => ({x:p.x, y:p.y, z:p.z}));
                    faceDataArray.push({ faceData: fd, texture: tex });
                }
                if (typeof batchResolve === 'function') batchResolve();
                return;
            }

            if (scanPhase === 'uploading') {
                w = res.image.width;
                h = res.image.height;
                cameraAspect = h / w;
            } else {
                w = videoElement.videoWidth;
                h = videoElement.videoHeight;
                if (!w) return;
                cameraAspect = h / w;
                
                if(canvasElement.width !== w) canvasElement.width = w;
                if(canvasElement.height !== h) canvasElement.height = h;

                canvasCtx.save();
                if (currentFacingMode === 'user') {
                    canvasCtx.translate(w, 0); canvasCtx.scale(-1, 1);
                }
                canvasCtx.drawImage(res.image, 0, 0, w, h);
                canvasCtx.restore();
            }

            if (res.multiFaceLandmarks && res.multiFaceLandmarks[0]) {
                const face = res.multiFaceLandmarks[0];
                
                if (scanPhase === 'uploading') {
                    sourceMirrored = false;
                    textures.front = captureFrameFromImage(res, w, h);
                    faceData = face.map(p => ({x:p.x, y:p.y, z:p.z}));
                    
                    document.getElementById('t_front').classList.add('done');
                    scanPhase = 'done'; 
                    speak("提取完成"); 
                    instruction.innerText = "提取成功！请选择模式";
                    
                    swapBtn.style.display = 'block';
                    viewBtn.style.display = 'block';
                    resetBtn.style.display = 'block';
                    return;
                }

                if (scanPhase === 'idle') {
                    startBtn.disabled = false; startBtn.innerText = "开始扫描提取五官";
                    uploadBtn.style.display = 'block';
                    instruction.innerText = "请将脸部对准屏幕或上传图片"; 
                    return;
                }

                if (scanPhase === 'front') {
                    if (!poseStartTime) { poseStartTime = Date.now(); }
                    const elapsed = Date.now() - poseStartTime;
                    const remaining = Math.ceil((LOCK_TIME - elapsed) / 1000);
                    if (remaining > 0) {
                        instruction.innerText = `正在捕获纹理... ${remaining}`;
                    } else {
                        sourceMirrored = (currentFacingMode === 'user');
                        textures.front = captureFrame(res, w, h);
                        faceData = face.map(p => ({x:p.x, y:p.y, z:p.z}));
                        
                        document.getElementById('t_front').classList.add('done');
                        scanPhase = 'done'; 
                        speak("提取完成"); 
                        instruction.innerText = "提取成功！请选择模式";
                        
                        startBtn.style.display = 'none';
                        uploadBtn.style.display = 'none';
                        swapBtn.style.display = 'block';
                        viewBtn.style.display = 'block';
                        resetBtn.style.display = 'block';
                    }
                }

                // AR 实时贴合更新位置 (兼容单图和多图模式)
                if ((scanPhase === 'ar_swap' || scanPhase === 'ar_swap_multiple') && faceMesh3D) {
                    const positions = faceMesh3D.geometry.attributes.position.array;
                    face.forEach((p, i) => {
                        positions[i * 3] = currentFacingMode === 'user' ? (1 - p.x) * w : p.x * w;
                        positions[i * 3 + 1] = p.y * h;
                        positions[i * 3 + 2] = -p.z * w; 
                    });
                    faceMesh3D.geometry.attributes.position.needsUpdate = true;
                    if (renderer3D) renderer3D.render(scene3D, camera3D);
                }
            } else {
                if (scanPhase === 'uploading') {
                    alert('未检测到人脸，请重新上传包含清晰人脸的图片！');
                    resetBtn.onclick();
                } else if ((scanPhase === 'ar_swap' || scanPhase === 'ar_swap_multiple') && renderer3D) {
                    // 移除 clear，丢失追踪时保留上一帧面具冻结，防止闪烁漏出真脸
                }
            }
        });

        function captureFrame(res, w, h) {
            const c = document.createElement('canvas'); c.width = w; c.height = h;
            const ctx = c.getContext('2d');
            if (currentFacingMode === 'user') {
                ctx.translate(w, 0); ctx.scale(-1, 1);
            }
            ctx.drawImage(res.image, 0, 0, w, h);
            return c.toDataURL('image/jpeg', 0.95);
        }

        function captureFrameFromImage(res, w, h) {
            const c = document.createElement('canvas'); c.width = w; c.height = h;
            const ctx = c.getContext('2d');
            ctx.drawImage(res.image, 0, 0, w, h);
            return c.toDataURL('image/jpeg', 0.95);
        }

        let currentFacingMode = 'user';
        let camera;

        function startCamera() {
            if (camera) camera.stop();
            camera = new Camera(videoElement, {
                onFrame: async () => { 
                    if (scanPhase !== 'uploading' && scanPhase !== 'batch_processing') {
                        await faceMesh.send({image: videoElement}); 
                    }
                },
                width: 1280,
                height: 720,
                facingMode: currentFacingMode
            });
            camera.start();
        }

        startCamera();

        startBtn.onclick = () => {
            scanPhase = 'front'; 
            startBtn.style.display = 'none';
            uploadBtn.style.display = 'none';
            flipBtn.style.display = 'none'; 
            document.getElementById('t_front').className = 'task active';
            speak("请保持不动");
        };

        uploadBtn.onclick = () => {
            uploadInput.click();
        };
        
        // 核心修复：多图上传并依次喂给神经网络提取数据
        async function processBatch() {
            scanPhase = 'batch_processing';
            startBtn.style.display = 'none';
            uploadBtn.style.display = 'none';
            viewBtn.style.display = 'none';
            flipBtn.style.display = 'none';
            
            for (let i = 0; i < imagesToProcess.length; i++) {
                instruction.innerText = `正在提取五官... (${i+1}/${imagesToProcess.length})`;
                await new Promise(async (resolve) => {
                    batchResolve = resolve;
                    await faceMesh.reset();
                    await faceMesh.send({image: imagesToProcess[i]});
                });
            }
            
            if (faceDataArray.length > 0) {
                scanPhase = 'batch_ready';
                instruction.innerText = `上传 ${imagesToProcess.length} 张照片，成功提取 ${faceDataArray.length} 张脸，点击开启变脸`;
                swapBtn.style.display = 'block';
                resetBtn.style.display = 'block';
            } else {
                alert('未从上传的图片中检测到人脸！');
                resetBtn.onclick();
            }
        }

        uploadInput.onchange = (e) => {
            const files = Array.from(e.target.files);
            if (!files.length) return;
            
            if (files.length > 1) {
                imagesToProcess = [];
                faceDataArray = [];
                currentFaceIndex = 0;
                let loadedCount = 0;
                
                instruction.innerText = "正在读取多张图片...";
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            imagesToProcess.push(img);
                            loadedCount++;
                            if (loadedCount === files.length) {
                                processBatch(); // 全部读取完毕后触发批量解析
                            }
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            } else {
                const file = files[0];
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = async () => {
                        scanPhase = 'uploading';
                        startBtn.style.display = 'none';
                        uploadBtn.style.display = 'none';
                        flipBtn.style.display = 'none';
                        instruction.innerText = "正在提取图片五官...";
                        await faceMesh.reset();
                        await faceMesh.send({image: img});
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        };

        flipBtn.onclick = () => {
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            startCamera();
        };

        resetBtn.onclick = () => {
            scanPhase = 'idle';
            poseStartTime = 0; faceData = null; textures.front = null;
            imagesToProcess = []; faceDataArray = []; currentFaceIndex = 0;
            document.getElementById('switch_container').style.display = 'none';
            document.getElementById('t_front').className = 'task';
            instruction.innerText = "准备好后点击下方按钮";
            
            startBtn.style.display = 'block';
            startBtn.disabled = false;
            uploadBtn.style.display = 'block';
            swapBtn.style.display = 'none';
            viewBtn.style.display = 'none';
            resetBtn.style.display = 'none';
            flipBtn.style.display = 'block';
            uploadInput.value = '';
            
            if(renderer3D) renderer3D.clear();
        };

        // 统一渲染 Three.js 人脸网格
        function loadFaceMesh3D(dataObj) {
            const w = canvasElement.width;
            const h = canvasElement.height;

            if (!renderer3D) {
                renderer3D = new THREE.WebGLRenderer({ canvas: threeCanvas, alpha: true, antialias: true });
                scene3D = new THREE.Scene();
            }
            renderer3D.setSize(w, h, false); 
            
            if (!camera3D) {
                camera3D = new THREE.OrthographicCamera(0, w, 0, h, -1000, 1000);
            }

            const geo = new THREE.BufferGeometry();
            const uv = [], pts2d = [];
            const isMirrored = dataObj.mirrored || false;

            dataObj.faceData.forEach(p => {
                uv.push(isMirrored ? 1 - p.x : p.x, 1 - p.y); 
                pts2d.push([p.x, p.y]);
            });
            
            geo.setAttribute('uv', new THREE.Float32BufferAttribute(uv, 2));
            geo.setIndex(new THREE.BufferAttribute(new Uint32Array(Delaunator.from(pts2d).triangles), 1));
            
            const pos = new Float32Array(dataObj.faceData.length * 3);
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));

            const loader = new THREE.TextureLoader();
            loader.load(dataObj.texture, (loadedTexture) => {
                if (faceMesh3D) {
                    faceMesh3D.geometry.dispose();
                    faceMesh3D.geometry = geo;
                    if (faceMesh3D.material.map) faceMesh3D.material.map.dispose();
                    faceMesh3D.material.map = loadedTexture;
                    faceMesh3D.material.needsUpdate = true;
                } else {
                    const material = new THREE.MeshBasicMaterial({
                        map: loadedTexture,
                        transparent: true,
                        opacity: 0.98,
                        side: THREE.DoubleSide
                    });
                    faceMesh3D = new THREE.Mesh(geo, material);
                    scene3D.add(faceMesh3D);
                }
            });
        }

        swapBtn.onclick = () => {
            if (scanPhase === 'batch_ready') {
                if (faceDataArray.length === 0) return;
                scanPhase = 'ar_swap_multiple';
                instruction.innerText = "川剧变脸模式 (点击按钮切换脸谱)";
                swapBtn.style.display = 'none';
                viewBtn.style.display = 'none';
                document.getElementById('switch_container').style.display = 'flex';
                
                loadFaceMesh3D({
                    faceData: faceDataArray[currentFaceIndex].faceData,
                    texture: faceDataArray[currentFaceIndex].texture,
                    mirrored: false
                });
            } else {
                if (!faceData || !textures.front) return;
                scanPhase = 'ar_swap';
                instruction.innerText = "实时贴合模式 (活动头部查看效果)";
                swapBtn.style.display = 'none';
                viewBtn.style.display = 'none';
                
                loadFaceMesh3D({
                    faceData: faceData,
                    texture: textures.front,
                    mirrored: sourceMirrored
                });
            }
        };

        // 绑定上一张/下一张事件
        document.getElementById('prev_btn').onclick = () => {
            if(faceDataArray.length === 0) return;
            currentFaceIndex = (currentFaceIndex - 1 + faceDataArray.length) % faceDataArray.length;
            loadFaceMesh3D({
                faceData: faceDataArray[currentFaceIndex].faceData,
                texture: faceDataArray[currentFaceIndex].texture,
                mirrored: false
            });
        };

        document.getElementById('next_btn').onclick = () => {
            if(faceDataArray.length === 0) return;
            currentFaceIndex = (currentFaceIndex + 1) % faceDataArray.length;
            loadFaceMesh3D({
                faceData: faceDataArray[currentFaceIndex].faceData,
                texture: faceDataArray[currentFaceIndex].texture,
                mirrored: false
            });
        };

        viewBtn.onclick = () => {
            sessionStorage.setItem('faceData', JSON.stringify(faceData));
            sessionStorage.setItem('textures', JSON.stringify(textures));
            sessionStorage.setItem('aspect', cameraAspect);
            sessionStorage.setItem('sourceMirrored', sourceMirrored);
            const win = window.open('', '_blank');
            win.document.write(`
                <html>
                <head><title>3D 拓扑预览</title><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"><\/script>
                <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"><\/script>
                <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/OBJExporter.js"><\/script>
                <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/GLTFExporter.js"><\/script>
                <script src="https://cdn.jsdelivr.net/npm/delaunator@5.0.0/delaunator.min.js"><\/script></head>
                <body style="margin:0; background:#000;">
                    <div style="position: absolute; top: 20px; right: 20px; z-index: 100; display: flex; gap: 10px;">
                        <button id="download_obj" style="padding: 12px 24px; background: linear-gradient(135deg, #00ff40 0%, #00b32d 100%); color: #000; border: 1px solid rgba(0,255,64,0.4); border-radius: 14px; cursor: pointer; font-size: 14px; font-weight: 600; box-shadow: 0 4px 15px rgba(0,255,64,0.2); transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);">下载 OBJ 模型</button>
                        <button id="download_glb" style="padding: 12px 24px; background: linear-gradient(135deg, #00ff40 0%, #00b32d 100%); color: #000; border: 1px solid rgba(0,255,64,0.4); border-radius: 14px; cursor: pointer; font-size: 14px; font-weight: 600; box-shadow: 0 4px 15px rgba(0,255,64,0.2); transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);">下载 GLB 模型</button>
                    </div>
                    <script>
                        const data = JSON.parse(sessionStorage.getItem('faceData'));
                        const texs = JSON.parse(sessionStorage.getItem('textures'));
                        const aspect = parseFloat(sessionStorage.getItem('aspect'));
                        const isMirrored = sessionStorage.getItem('sourceMirrored') === 'true';
                        const scene = new THREE.Scene();
                        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
                        const renderer = new THREE.WebGLRenderer({antialias:true});
                        renderer.setSize(window.innerWidth, window.innerHeight);
                        document.body.appendChild(renderer.domElement);
                        new THREE.OrbitControls(camera, renderer.domElement);
                        const geo = new THREE.BufferGeometry();
                        const pos = [], uv = [], pts2d = [];
                        data.forEach(p => {
                            pos.push((0.5-p.x)*3, (0.5-p.y)*3*aspect, -p.z*3);
                            uv.push(isMirrored ? 1-p.x : p.x, 1-p.y); pts2d.push([p.x, p.y]);
                        });
                        geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
                        geo.setAttribute('uv', new THREE.Float32BufferAttribute(uv, 2));
                        geo.setIndex(new THREE.BufferAttribute(new Uint32Array(Delaunator.from(pts2d).triangles), 1));
                        geo.computeVertexNormals();
                        const material = new THREE.MeshBasicMaterial({ map: new THREE.TextureLoader().load(texs.front), side: THREE.DoubleSide });
                        const mesh = new THREE.Mesh(geo, material);
                        scene.add(mesh);
                        camera.position.z = 2;
                        function anim() { requestAnimationFrame(anim); renderer.render(scene, camera); }
                        anim();

                        document.getElementById('download_obj').addEventListener('click', () => {
                            const exporter = new THREE.OBJExporter();
                            const result = exporter.parse(scene);
                            const blob = new Blob([result], { type: 'text/plain' });
                            const url = URL.createObjectURL(blob);
                            const link = document.createElement('a');
                            link.style.display = 'none';
                            link.href = url;
                            link.download = 'face_model.obj';
                            document.body.appendChild(link);
                            link.click();
                            document.body.removeChild(link);
                            URL.revokeObjectURL(url);
                        });

                        document.getElementById('download_glb').addEventListener('click', () => {
                            const exporter = new THREE.GLTFExporter();
                            exporter.parse(scene, function (gltf) {
                                const blob = new Blob([gltf], { type: 'application/octet-stream' });
                                const url = URL.createObjectURL(blob);
                                const link = document.createElement('a');
                                link.style.display = 'none';
                                link.href = url;
                                link.download = 'face_model.glb';
                                document.body.appendChild(link);
                                link.click();
                                document.body.removeChild(link);
                                URL.revokeObjectURL(url);
                            }, { binary: true });
                        });
                    <\/script>
                </body></html>
            `);
            win.document.close();
        };
    </script>
</body>
</html>
